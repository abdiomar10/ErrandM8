{% extends "UsendApp/Base.html" %}
{% block title %}Reset password — Usend{% endblock %}
{% block content %}
<div style="max-width:420px;margin:100px auto;padding:0 24px;">
  <h1 style="font-family:var(--font-head);font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:8px;">Reset password</h1>
  <p style="color:var(--muted);font-size:14px;margin-bottom:32px;">Enter your email and we'll send reset instructions.</p>
  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label class="label">Email</label>
        <input type="email" name="email" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Send reset link</button>
    </form>
  </div>
  <div style="margin-top:20px;text-align:center;font-size:14px;color:var(--muted);">
    Remember your password? <a href="{% url 'login' %}" style="color:var(--orange);text-decoration:none;font-weight:500;">Log in</a>
  </div>
</div>
{% endblock %}
