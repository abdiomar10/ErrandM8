{% extends "UsendApp/Base.html" %}
{% block title %}Email sent — Usend{% endblock %}
{% block content %}
<div style="max-inline-size:480px;margin:100px auto;padding:0 24px;text-align:center;">
  <div style="font-size:48px;margin-block-end:16px;">📬</div>
  <h1 style="font-family:var(--font-head);font-size:28px;font-weight:800;margin-block-end:10px;">Check your inbox</h1>
  <p style="color:var(--muted);font-size:15px;line-height:1.7;">We've emailed you instructions to reset your password. Check your spam folder if it doesn't arrive.</p>
  <div style="margin-block-start:28px;">
    <a href="{% url 'login' %}" style="color:var(--orange);font-size:14px;text-decoration:none;font-weight:500;">← Back to login</a>
  </div>
</div>
{% endblock %}
