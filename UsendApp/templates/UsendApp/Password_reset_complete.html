{% extends "UsendApp/Base.html" %}
{% block title %}Password updated — Usend{% endblock %}
{% block content %}
<div style="max-width:480px;margin:100px auto;padding:0 24px;text-align:center;">
  <div style="font-size:48px;margin-bottom:16px;">✅</div>
  <h1 style="font-family:var(--font-head);font-size:28px;font-weight:800;margin-bottom:10px;">Password updated</h1>
  <p style="color:var(--muted);font-size:15px;margin-bottom:28px;">You can now log in with your new password.</p>
  <a href="{% url 'login' %}" class="btn btn-primary">Log in</a>
</div>
{% endblock %}
